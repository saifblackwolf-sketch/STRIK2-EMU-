workflows:
  m4-ultimate-build:
    name: STRIK2 M4 Auto-Generate Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        PROJECT_NAME: "iPSX2"
    scripts:
      - name: Generate Xcode Project (CMake)
        script: |
          # الدخول للمجلد الصحيح حيث يوجد ملف CMakeLists.txt
          cd src/cpp
          mkdir build && cd build
          cmake .. -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos
          
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لشاشة iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
          
      - name: Build IPA
        script: |
          # العودة لمجلد البناء وتشغيل xcodebuild
          cd src/cpp/build
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          xcodebuild build \
            -project "$PROJ" \
            -scheme "$PROJECT_NAME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - src/cpp/build/**/*.app
      - src/cpp/build/**/*.ipa
