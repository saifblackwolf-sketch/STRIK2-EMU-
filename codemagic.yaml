workflows:
  m4-ultimate-build:
    name: STRIK2 M4 Auto-Generate Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        PROJECT_NAME: "iPSX2" # أو اسم المحاكي اللي تفضله
    scripts:
      - name: Generate Xcode Project (CMake)
        script: |
          # صناعة ملف الـ xcodeproj تلقائياً من ملفات السورس كود
          mkdir build && cd build
          cmake .. -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos
          
      - name: M4 Display Patch
        script: |
          # تعديل أبعاد الشاشة لنسبة 1.432f لتناسب الـ iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
          
      - name: Build IPA
        script: |
          cd build
          # البحث عن الملف اللي صنعناه وبناؤه فوراً
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          xcodebuild build \
            -project "$PROJ" \
            -scheme "$PROJECT_NAME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/**/*.app
      - build/**/*.ipa
