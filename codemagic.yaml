workflows:
  m4-ultimate-build:
    name: STRIK2 M4 Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لشاشة iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
      - name: Build Emulator
        script: |
          # البحث عن ملف المشروع مع استبعاد المكتبات الخارجية
          PROJ=$(find . -name "*.xcodeproj" -not -path "*/3rdparty/*" | head -n 1)
          if [ -z "$PROJ" ]; then echo "Error: Project file not found!"; exit 1; fi
          echo "Building: $PROJ"
          
          # استخراج اسم الـ Scheme تلقائياً
          SCHEME=$(xcodebuild -project "$PROJ" -list | sed -n '/Schemes:/,$p' | sed -n '2p' | tr -d ' ')
          echo "Detected Scheme: $SCHEME"
          
          xcodebuild build \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - build/ios/ipa/*.ipa